services:
  - type: web
    name: insta-guard-ai
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && python train_models.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/fakeguard.db