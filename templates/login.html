{% extends "base.html" %}
{% block title %}Login - InstaGuard AI{% endblock %}
{% block extra_css %}
<style>
    .auth-wrap { max-width: 440px; margin: 4rem auto; }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .auth-header p { color: var(--text-dim); font-size: 0.9rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-dim); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}
{% block content %}
<div class="container">
    <div class="auth-wrap animate-in">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Login to your InstaGuard account</p>
        </div>
        <div class="card">
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
        </div>
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Sign up free</a>
        </div>
    </div>
</div>
{% endblock %}
